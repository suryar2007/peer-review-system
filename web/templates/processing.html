<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analyzing Paper...</title>
<style>
  :root { --accent: #6366f1; --accent-glow: rgba(99,102,241,0.25); --bg: #f8fafc; --text: #0f172a; --muted: #94a3b8; --green: #22c55e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .container { text-align: center; max-width: 480px; width: 100%; padding: 2rem; }

  .spinner {
    width: 52px; height: 52px; margin: 0 auto 1.75rem;
    border: 4px solid #e2e8f0; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  h2 { font-size: 1.35rem; margin-bottom: 0.4rem; }
  .phase { color: var(--accent); font-size: 0.92rem; margin-bottom: 1.75rem; min-height: 1.4em; }

  /* ── Steps ── */
  .steps { text-align: left; margin: 0 auto 1.75rem; max-width: 300px; }
  .step {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.45rem 0; font-size: 0.87rem; color: var(--muted);
    transition: color 0.3s;
  }
  .step-icon {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; color: white;
    background: #e2e8f0; transition: background 0.3s, box-shadow 0.3s;
  }
  .step.active { color: var(--accent); font-weight: 600; }
  .step.active .step-icon {
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    animation: pulse 1.8s ease infinite;
  }
  .step.done { color: var(--green); }
  .step.done .step-icon { background: var(--green); }

  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px var(--accent-glow); } 50% { box-shadow: 0 0 0 8px transparent; } }

  .estimate { color: var(--muted); font-size: 0.78rem; }
  .elapsed { color: var(--muted); font-size: 0.78rem; margin-top: 0.25rem; font-variant-numeric: tabular-nums; }

  .error-msg {
    background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px;
    padding: 1rem; color: #dc2626; font-size: 0.86rem; margin-top: 1.25rem;
    display: none; text-align: left;
  }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <h2>Analyzing Paper</h2>
  {% if original_filename %}<p style="color:var(--muted);font-size:0.88rem;margin-bottom:0.6rem;">{{ original_filename }}</p>{% endif %}
  <p class="phase" id="phase">Starting pipeline...</p>

  <div class="steps">
    <div class="step active" id="step-extract">
      <span class="step-icon">1</span> Extract citations &amp; claims
    </div>
    <div class="step" id="step-resolve">
      <span class="step-icon">2</span> Resolve citations
    </div>
    <div class="step" id="step-reason">
      <span class="step-icon">3</span> Verify claims
    </div>
    <div class="step" id="step-report">
      <span class="step-icon">4</span> Generate report
    </div>
  </div>

  <p class="estimate">This typically takes 10-15 minutes</p>
  <p class="elapsed" id="elapsed"></p>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const uploadId = "{{ upload_id }}";
const phaseEl = document.getElementById('phase');
const errorEl = document.getElementById('errorMsg');
const spinnerEl = document.getElementById('spinner');
const elapsedEl = document.getElementById('elapsed');
const startTime = Date.now();

const STEPS = ['step-extract', 'step-resolve', 'step-reason', 'step-report'];
const STEP_MAP = {
  'Starting': 'step-extract',
  'Loading': 'step-extract',
  'Extract': 'step-extract',
  'Resolv': 'step-resolve',
  'Verif': 'step-reason',
  'Reason': 'step-reason',
  'report': 'step-report',
  'Complete': 'step-report',
};

function updateSteps(phase) {
  let activeId = null;
  for (const [key, stepId] of Object.entries(STEP_MAP)) {
    if (phase.includes(key)) { activeId = stepId; break; }
  }

  let reachedActive = false;
  for (const sid of STEPS) {
    const el = document.getElementById(sid);
    el.classList.remove('active', 'done');
    if (sid === activeId) {
      el.classList.add('active');
      reachedActive = true;
    } else if (!reachedActive) {
      el.classList.add('done');
    }
  }

}

function updateElapsed() {
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  elapsedEl.textContent = `Elapsed: ${m}m ${s.toString().padStart(2, '0')}s`;
}

async function poll() {
  updateElapsed();
  try {
    const resp = await fetch(`/api/status/${uploadId}`);
    const data = await resp.json();

    phaseEl.textContent = data.phase || 'Processing...';
    updateSteps(data.phase || '');

    if (data.status === 'done') {
      phaseEl.textContent = 'Complete! Redirecting...';
      spinnerEl.style.borderTopColor = '#22c55e';

      // Mark all steps done
      STEPS.forEach(sid => {
        const el = document.getElementById(sid);
        el.classList.remove('active');
        el.classList.add('done');
      });

      setTimeout(() => { window.location.href = data.review_url; }, 800);
      return;
    }
    if (data.status === 'error') {
      spinnerEl.style.display = 'none';
      phaseEl.textContent = 'Pipeline failed';
      errorEl.textContent = data.error || 'Unknown error';
      errorEl.style.display = 'block';
      return;
    }
  } catch (e) {
    // Network error, retry
  }
  setTimeout(poll, 4000);
}

setInterval(updateElapsed, 1000);
poll();
</script>
</body>
</html>
